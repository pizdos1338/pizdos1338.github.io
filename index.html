<head>

    <title>Пиздос – выбери язык</title>
    <style>
        body {
            background: #0a0f1e;
            color: #eee;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .lang-box {
            text-align: center;
            background: #1e2a3a;
            padding: 2rem;
            border-radius: 2rem;
            box-shadow: 0 0 20px #ff3366;
        }
        h1 { font-size: 3rem; text-shadow: 4px 4px 0 #ff3366; }
        .lang-list { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .lang-list a {
            background: #ff3366;
            color: #0a0f1e;
            padding: 0.8rem 1.5rem;
            text-decoration: none;
            font-weight: bold;
            border-radius: 3rem;
            transition: 0.3s;
        }
        .lang-list a:hover { background: #ff6699; transform: scale(1.05); }
        footer { margin-top: 2rem; font-size: 0.8rem; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="lang-box">
        <h1>☠️ ПИЗДОС ☠️</h1>
        <p>Выберите язык / Choose language / Оберіть мову / Выберыце мову / 选择语言</p>
        <div class="lang-list">
            <a href="/ru/">🇷🇺 Русский</a>
            <a href="/en/">🇬🇧 English</a>
            <a href="/uk/">🇺🇦 Українська</a>
            <a href="/be/">🇧🇾 Беларуская</a>
            <a href="/zh/">🇨🇳 中文</a>
        </div>
        <footer>⚠️ Внимание: сайт содержит следы тотального пиздоса</footer>
    </div>
</body>
</html>
